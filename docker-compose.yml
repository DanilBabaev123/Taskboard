version: '3.8'

services:
  # Database server
  mysql:
    image: mysql:8.0
    container_name: taskboard_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskboard
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: taskboard
    ports:
      - "8889"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskboard_net

  # PHP-FPM (for Laravel)
  php:
    build:
      context: ./docker/php
    container_name: taskboard_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
    networks:
      - taskboard_net

  # Nginx web server
  nginx:
    image: nginx:alpine
    container_name: taskboard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - taskboard_net

  # Node.js for frontend build (Vite)
  node:
    image: node:18-alpine
    container_name: taskboard_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run build"
    networks:
      - taskboard_net

networks:
  taskboard_net:

volumes:
  mysql_data:
